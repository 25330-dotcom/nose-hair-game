<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鼻から鼻毛抜きゲーム | 究極の抜き心地</title>
  
  <!-- React & Dependencies -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --primary-color: #ff4757;
      --secondary-color: #3742fa;
      --bg-color: #0c0c0e;
      --card-bg: rgba(25, 25, 30, 0.8);
      --accent-color: #ffd700;
      --text-color: #ffffff;
      --text-dim: #a4b0be;
      --neon-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(55, 66, 250, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255, 71, 87, 0.1) 0%, transparent 40%);
      color: var(--text-color);
      font-family: 'Outfit', 'Noto Sans JP', sans-serif;
      overflow: hidden;
      touch-action: none;
      min-height: 100vh;
    }

    #root {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .panel {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      max-width: 440px;
      width: 100%;
    }

    h1 {
      font-weight: 900;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, var(--primary-color), #ff6b81);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(var(--neon-shadow));
      letter-spacing: -1px;
    }

    p {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .btn {
      background: linear-gradient(135deg, var(--primary-color) 0%, #ff6b81 100%);
      color: white;
      border: none;
      padding: 16px 32px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
      width: 100%;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 15px 30px rgba(255, 71, 87, 0.5);
    }

    .btn-secondary {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: none;
    }

    .high-score-card {
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      padding: 15px;
      margin: 20px 0;
    }

    .score-item {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin: 10px 0;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
      padding: 15px 25px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
    }

    .score-hud { font-weight: 800; color: var(--accent-color); font-size: 1.2rem; }
    .timer-hud { font-weight: 800; color: var(--primary-color); font-size: 1.2rem; }

    .game-container {
      position: relative;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0,0,0,0.5);
    }

    .face-wrapper {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      background-color: #000;
    }

    .hair {
      position: absolute;
      width: 4px;
      background: linear-gradient(to bottom, #111, #333);
      border-radius: 2px;
      cursor: grab;
      touch-action: none;
      transform-origin: top center;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .popped {
      animation: popOut 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      pointer-events: none;
    }

    @keyframes popOut {
      0% { transform: scale(1) translateY(0) rotate(0); opacity: 1; }
      100% { transform: scale(2) translateY(150px) rotate(120deg); opacity: 0; }
    }

    .floating-text {
      position: absolute;
      color: var(--text-color);
      font-weight: 900;
      font-size: 1.5rem;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      z-index: 100;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 1; }
      100% { transform: translateY(-80px) scale(1.5); opacity: 0; }
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-2px, -2px) rotate(-1deg); }
      75% { transform: translate(2px, 2px) rotate(1deg); }
    }

    .shake {
      animation: shake 0.15s infinite;
    }

    .pain-filter {
      filter: sepia(0.3) saturate(2.5) hue-rotate(-20deg) brightness(0.8);
    }

    .result-score {
      font-size: 5rem;
      font-weight: 900;
      color: var(--primary-color);
      margin: 10px 0;
      line-height: 1;
    }
  </style>
</head>

      name: "鼻のイラスト",
      noseX: 50,
      noseY: 78,
      defaultZoom: 1.2,
      defaultOffsetY: 48
    }];

    const App = () => {
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(GAME_TIME);
      const [gameState, setGameState] = useState('title');
      const [hairs, setHairs] = useState([]);
      const [popTexts, setPopTexts] = useState([]);
      const [pain, setPain] = useState(false);
      const [highscores, setHighscores] = useState(() => {
        try {
          const saved = localStorage.getItem('nose_hair_highscores');
          return saved ? JSON.parse(saved) : [];
        } catch (e) { return []; }
      });

      const isPlaying = gameState === 'playing';
      const currentFace = FACES[0];
      const containerRef = useRef(null);
      const painTimeoutRef = useRef(null);

      const startGame = () => {
        setScore(0);
        setTimeLeft(GAME_TIME);
        setGameState('playing');
        generateHairs(20);
      };

      const generateHairs = (count) => {
        const newHairs = [];
        for (let i = 0; i < count; i++) {
          newHairs.push({
            id: Math.random().toString(36).substr(2, 9),
            x: currentFace.noseX + (Math.random() * 14 - 7),
            y: currentFace.noseY + (Math.random() * 2 - 1),
            length: 12 + Math.random() * 18,
            angle: -5 + Math.random() * 10,
            isPulled: false,
            dragY: 0,
            dragX: 0
          });
        }
        setHairs(newHairs);
      };

      useEffect(() => {
        if (isPlaying && timeLeft > 0) {
          const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
          return () => clearTimeout(timer);
        } else if (timeLeft === 0 && isPlaying) {
          setGameState('result');
          setHairs([]);
          const newScores = [...highscores, score].sort((a, b) => b - a).slice(0, 3);
          setHighscores(newScores);
          localStorage.setItem('nose_hair_highscores', JSON.stringify(newScores));
        }
      }, [timeLeft, isPlaying, score]);

      const handlePointerDown = (e, hairId) => {
        if (!isPlaying) return;
        const target = e.target;
        target.setPointerCapture(e.pointerId);
        const startY = e.clientY;
        const onPointerMove = (moveEv) => {
          const deltaY = moveEv.clientY - startY;
          const deltaX = moveEv.clientX - e.clientX;
          setHairs(prev => prev.map(h => h.id === hairId && !h.isPulled ? { ...h, dragY: deltaY, dragX: deltaX } : h));
        };
        const onPointerUp = (upEv) => {
          const deltaY = upEv.clientY - startY;
          if (deltaY > 35) {
            pluckHair(hairId, upEv.clientX, upEv.clientY);
          } else {
            setHairs(prev => prev.map(h => h.id === hairId ? { ...h, dragY: 0, dragX: 0 } : h));
          }
          target.releasePointerCapture(e.pointerId);
          target.removeEventListener('pointermove', onPointerMove);
          target.removeEventListener('pointerup', onPointerUp);
        };
        target.addEventListener('pointermove', onPointerMove);
        target.addEventListener('pointerup', onPointerUp);
      };

      const pluckHair = (id, clientX, clientY) => {
        setHairs(prev => prev.map(h => h.id === id ? { ...h, isPulled: true } : h));
        setScore(s => s + 1);
        setPain(true);
        if (painTimeoutRef.current) clearTimeout(painTimeoutRef.current);
        painTimeoutRef.current = setTimeout(() => setPain(false), 250);

        const containerRect = containerRef.current.getBoundingClientRect();
        const textX = clientX - containerRect.left;
        const textY = clientY - containerRect.top;
        const messages = ["スポッ!", "イタッ!", "ブチッ!", "ナイス!", "抜けた!"];
        const newText = { id: Math.random(), x: textX, y: textY, text: messages[Math.floor(Math.random() * messages.length)] };
        setPopTexts(prev => [...prev, newText]);

        setTimeout(() => {
          setHairs(prev => {
            const activeHairs = prev.filter(h => !h.isPulled);
            if (activeHairs.length < 6) {
              const fresh = [];
              for (let i = 0; i < 15; i++) {
                fresh.push({
                  id: Math.random().toString(36).substr(2, 9),
                  x: currentFace.noseX + (Math.random() * 14 - 7),
                  y: currentFace.noseY + (Math.random() * 2 - 1),
                  length: 12 + Math.random() * 18,
                  angle: -5 + Math.random() * 10,
                  isPulled: false, dragY: 0, dragX: 0
                });
              }
              return [...activeHairs, ...fresh];
            }
            return prev;
          });
        }, 300);
      };

      const shareX = () => {
        const text = `「鼻から鼻毛抜きゲーム」で、${score}本の鼻毛を引っこ抜いた！🪠\n君も限界まで抜いてみないか？\n#鼻毛抜きゲーム #鼻毛チャレンジ\n`;
        window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`, '_blank');
      };

      return (
        <div className="game-wrapper">
          {gameState === 'title' && (
            <div className="panel">
              <h1>鼻から鼻毛抜き</h1>
              <p>15秒間でどれだけ抜けるかな？</p>
              <div className="high-score-card">
                <h3>🏆 Hall of Fame</h3>
                {highscores.length === 0 ? <div>No records yet</div> : highscores.map((s, idx) => (
                  <div key={idx} className="score-item">
                    <span className={idx === 0 ? "rank-gold" : idx === 1 ? "rank-silver" : "rank-bronze"}>{idx + 1}st</span>
                    <span>{s} hairs</span>
                  </div>
                ))}
              </div>
              <button className="btn" onClick={startGame}>GAME START</button>
            </div>
          )}
          {gameState === 'result' && (
            <div className="panel">
              <h1>FINISH!</h1>
              <p>抜きまくった君の記録は...</p>
              <div className="result-score">{score}<span className="unit">本</span></div>
              <button className="btn" onClick={shareX}>𝕏 で記録をシェア</button>
              <button className="btn btn-secondary" onClick={() => setGameState('title')}>タイトルへ戻る</button>
            </div>
          )}
          {isPlaying && (
            <>
              <div className="hud">
                <div className="score-hud">SCORE: {score}</div>
                <div className="timer-hud">TIME: {timeLeft}s</div>
              </div>
              <div className={`game-container ${pain ? 'shake' : ''}`} ref={containerRef}>
                <div className="face-wrapper">
                  <img src={currentFace.src} alt="Face" className={`screen-img ${pain ? 'pain-filter' : ''}`} style={{width: '100%', height: '100%', objectFit: 'cover', transform: `scale(${currentFace.defaultZoom}) translate(0, ${currentFace.defaultOffsetY - 50}%)`}} />
                  {hairs.map(hair => (
                    <div key={hair.id} className={`hair ${hair.isPulled ? 'popped' : ''}`} onPointerDown={(e) => handlePointerDown(e, hair.id)} style={{left: `${hair.x}%`, top: `${hair.y}%`, height: `${Math.max(0, hair.length + hair.dragY)}px`, transform: `rotate(${hair.angle}deg)`}} />
                  ))}
                  {pain && (
                    <div style={{position: 'absolute', top: '42%', left: '0', width: '100%', display: 'flex', justifyContent: 'center', gap: '50px', pointerEvents: 'none', zIndex: 40, color: '#111', fontSize: '50px', fontWeight: '900', opacity: 0.8}}>
                      <span>&gt;</span><span>&lt;</span>
                    </div>
                  )}
                  {popTexts.map(pt => (
                    <div key={pt.id} className="floating-text" style={{ left: pt.x, top: pt.y }} onAnimationEnd={() => setPopTexts(prev => prev.filter(p => p.id !== pt.id))}>{pt.text}</div>
                  ))}
                </div>
              </div>
            </>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
